<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .panel,
    .phone,
    .money-card,
    .budget-card,
    .stat-card,
    .reward-card,
    .coin,
    .caption-bar {
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 520ms cubic-bezier(.22,1,.36,1), filter 520ms cubic-bezier(.22,1,.36,1), opacity 520ms cubic-bezier(.22,1,.36,1);
    }

    .flow-line,
    .chart-line {
      transition: stroke 420ms ease, stroke-dashoffset 780ms cubic-bezier(.22,1,.36,1), opacity 420ms ease;
    }

    .flow-line {
      stroke-dasharray: 14 10;
      stroke-dashoffset: 0;
    }

    svg:hover .left-panel {
      transform: translateX(-10px);
    }

    svg:hover .phone {
      transform: translateY(-10px) rotate(-1deg);
      filter: drop-shadow(0 18px 28px rgba(0, 95, 88, .16));
    }

    svg:hover .right-panel {
      transform: translateX(12px);
    }

    svg:hover .income-card {
      transform: translate(8px, -12px);
    }

    svg:hover .expense-card {
      transform: translate(20px, 0);
    }

    svg:hover .budget-card {
      transform: translate(-14px, -8px);
    }

    svg:hover .stat-card {
      transform: translate(14px, 8px);
    }

    svg:hover .reward-card {
      transform: translate(18px, -8px);
    }

    svg:hover .coin-a {
      transform: translate(-14px, -16px) scale(1.08);
    }

    svg:hover .coin-b {
      transform: translate(10px, -22px) scale(1.12);
    }

    svg:hover .coin-c {
      transform: translate(18px, 14px) scale(1.06);
    }

    svg:hover .flow-line {
      stroke: #007773;
      stroke-dashoffset: -44;
      opacity: .95;
    }

    svg:hover .chart-line {
      stroke: #007773;
    }

    svg:hover .caption-bar {
      transform: translateY(-6px);
      filter: drop-shadow(0 16px 24px rgba(0, 95, 88, .18));
    }

    @media (prefers-reduced-motion: reduce) {
      .panel,
      .phone,
      .money-card,
      .budget-card,
      .stat-card,
      .reward-card,
      .coin,
      .caption-bar,
      .flow-line,
      .chart-line {
        transition-duration: 1ms;
      }
    }
  </style>

  <rect width="1200" height="800" fill="#F7FAF9"/>
  <rect x="84" y="78" width="1032" height="644" rx="28" fill="#FFFFFF" stroke="#AFAFAF" stroke-width="2"/>

  <g class="panel left-panel">
    <rect x="130" y="126" width="260" height="548" rx="22" fill="#F3F7F6" stroke="#D8E4E1" stroke-width="2"/>
    <text x="160" y="176" fill="#005F58" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Money inputs</text>
    <text x="160" y="214" fill="#6A6A6A" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500">Simple capture for daily</text>
    <text x="160" y="240" fill="#6A6A6A" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500">income and expenses</text>

    <g class="money-card income-card">
      <rect x="160" y="306" width="178" height="66" rx="16" fill="#FFFFFF" stroke="#AFAFAF" stroke-width="2"/>
      <circle cx="194" cy="339" r="15" fill="#007773" fill-opacity=".16"/>
      <path d="M194 331V347" stroke="#007773" stroke-width="3" stroke-linecap="round"/>
      <path d="M186 339H202" stroke="#007773" stroke-width="3" stroke-linecap="round"/>
      <text x="226" y="346" fill="#282828" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Income</text>
    </g>

    <g class="money-card expense-card">
      <rect x="160" y="410" width="178" height="66" rx="16" fill="#FFFFFF" stroke="#AFAFAF" stroke-width="2"/>
      <circle cx="194" cy="443" r="15" fill="#D95F59" fill-opacity=".16"/>
      <path d="M186 443H202" stroke="#D95F59" stroke-width="3" stroke-linecap="round"/>
      <text x="226" y="450" fill="#282828" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Expense</text>
    </g>

    <g class="coin coin-a">
      <circle cx="304" cy="548" r="22" fill="#E6A23C" fill-opacity=".22"/>
      <text x="297" y="555" fill="#80570E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">$</text>
    </g>
    <g class="coin coin-b">
      <circle cx="236" cy="566" r="18" fill="#007773" fill-opacity=".2"/>
      <text x="230" y="572" fill="#005F58" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">$</text>
    </g>
  </g>

  <path class="flow-line" d="M390 398H458" stroke="#C9D8D4" stroke-width="3" stroke-linecap="round"/>
  <path class="flow-line" d="M440 382L458 398L440 414" stroke="#C9D8D4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g class="phone">
    <rect x="462" y="118" width="286" height="566" rx="38" fill="#282828"/>
    <rect x="480" y="144" width="250" height="514" rx="30" fill="#FFFFFF"/>
    <rect x="558" y="158" width="94" height="8" rx="4" fill="#E4E4E4"/>
    <text x="518" y="214" fill="#005F58" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Rubee</text>
    <text x="518" y="246" fill="#6A6A6A" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500">Your finance picture</text>

    <rect x="516" y="286" width="178" height="86" rx="18" fill="#F3F7F6" stroke="#D8E4E1" stroke-width="2"/>
    <text x="538" y="322" fill="#282828" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Balance</text>
    <text x="538" y="352" fill="#005F58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">$2,480</text>

    <g class="budget-card">
      <rect x="516" y="408" width="84" height="100" rx="18" fill="#FFF8EC" stroke="#E6A23C" stroke-width="2"/>
      <circle cx="558" cy="450" r="25" fill="#E6A23C" fill-opacity=".22"/>
      <path d="M543 450H573" stroke="#E6A23C" stroke-width="6" stroke-linecap="round"/>
      <text x="535" y="486" fill="#80570E" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Budget</text>
    </g>

    <g class="stat-card">
      <rect x="616" y="408" width="84" height="100" rx="18" fill="#F3F7F6" stroke="#007773" stroke-width="2"/>
      <path class="chart-line" d="M635 470C646 438 660 478 672 446C680 424 690 436 694 430" stroke="#005F58" stroke-width="5" stroke-linecap="round"/>
      <text x="642" y="486" fill="#005F58" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Stats</text>
    </g>

    <g class="reward-card">
      <rect x="516" y="538" width="184" height="58" rx="16" fill="#F2F5FF" stroke="#64748B" stroke-width="2"/>
      <circle cx="546" cy="567" r="14" fill="#64748B" fill-opacity=".18"/>
      <path d="M540 567H552M546 561V573" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
      <text x="572" y="573" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Rewards</text>
    </g>
  </g>

  <path class="flow-line" d="M748 398H808" stroke="#C9D8D4" stroke-width="3" stroke-linecap="round"/>
  <path class="flow-line" d="M790 382L808 398L790 414" stroke="#C9D8D4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g class="panel right-panel">
    <rect x="808" y="126" width="262" height="548" rx="22" fill="#F3F7F6" stroke="#D8E4E1" stroke-width="2"/>
    <text x="842" y="176" fill="#005F58" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Clear control</text>
    <text x="842" y="214" fill="#6A6A6A" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500">A simpler way to track,</text>
    <text x="842" y="240" fill="#6A6A6A" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500">learn, and stay engaged</text>

    <rect x="842" y="310" width="176" height="58" rx="15" fill="#FFFFFF" stroke="#AFAFAF" stroke-width="2"/>
    <rect x="866" y="334" width="72" height="10" rx="5" fill="#007773" fill-opacity=".32"/>
    <rect x="952" y="334" width="38" height="10" rx="5" fill="#C9D8D4"/>

    <rect x="842" y="402" width="176" height="58" rx="15" fill="#FFFFFF" stroke="#AFAFAF" stroke-width="2"/>
    <rect x="866" y="426" width="94" height="10" rx="5" fill="#E6A23C" fill-opacity=".34"/>
    <rect x="974" y="426" width="20" height="10" rx="5" fill="#C9D8D4"/>

    <rect x="842" y="494" width="176" height="58" rx="15" fill="#FFFFFF" stroke="#AFAFAF" stroke-width="2"/>
    <rect x="866" y="518" width="58" height="10" rx="5" fill="#D95F59" fill-opacity=".3"/>
    <rect x="938" y="518" width="52" height="10" rx="5" fill="#C9D8D4"/>

    <g class="coin coin-c">
      <circle cx="1018" cy="590" r="22" fill="#007773" fill-opacity=".18"/>
      <path d="M1008 590H1028M1018 580V600" stroke="#007773" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <g class="caption-bar">
    <rect x="128" y="612" width="942" height="62" rx="16" fill="#005F58"/>
    <text x="158" y="651" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">A simpler personal finance loop: capture money, understand patterns, set budgets, and stay motivated</text>
  </g>
</svg>
